<style>
:root {
  --navy: #0D1B3E;
  --navy2: #1A2F5A;
  --navy3: #0A1428;
  --gold: #C9A84C;
  --gold2: #E8C96A;
  --white: #FFFFFF;
  --muted: #8A8070;
  --border: rgba(201,168,76,0.2);
  --border2: rgba(201,168,76,0.45);
  --glass: rgba(13,27,62,0.75);
  --glass2: rgba(26,47,90,0.85);
  --green: #00CC77;
  --purple: #9B59B6;
  --blue: #3498DB;
  --orange: #E67E22;
  --red: #E74C3C;
  --r: 16px;
  --rs: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--navy3);
  color: var(--white);
  position: fixed;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* ── BACKGROUND ─────────────────────────────────── */
.app-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: linear-gradient(135deg, #0A1428 0%, #0D1B3E 40%, #1A2F5A 70%, #0D1B3E 100%);
  overflow: hidden;
}
.app-bg::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(201,168,76,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(201,168,76,0.05) 0%, transparent 50%),
              radial-gradient(ellipse at 90% 10%, rgba(52,152,219,0.04) 0%, transparent 40%);
  animation: bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0% { transform: scale(1) rotate(0deg); }
  100% { transform: scale(1.05) rotate(2deg); }
}

/* ── HEADER ─────────────────────────────────────── */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 30;
  padding: 12px 16px 10px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  background: linear-gradient(180deg, rgba(10,20,40,0.98) 0%, rgba(10,20,40,0.85) 100%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-logo {
  width: 38px; height: 38px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--gold);
  box-shadow: 0 0 12px rgba(201,168,76,0.3);
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  color: var(--gold);
  line-height: 1.1;
}
.header-sub { font-size: 10px; color: var(--muted); font-weight: 400; margin-top: 1px; letter-spacing: 0.5px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.live-badge {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  background: rgba(201,168,76,0.12);
  border: 1px solid var(--border2);
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  color: var(--gold);
}
.live-dot-anim {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  animation: livePulse 1.5s infinite;
}
@keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

/* ── SCROLL AREA ─────────────────────────────────── */
.scroll-area {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  z-index: 1;
  padding-bottom: calc(72px + var(--safe-bottom));
}
.screen { display: none; padding: 0; min-height: 100%; }
.screen.active { display: block; }
.screen-content {
  max-width: 480px;
  margin: 0 auto;
  padding: 80px 14px 20px;
}

/* ── TAB BAR ─────────────────────────────────────── */
.tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 30;
  height: calc(56px + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(10,20,40,0.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.35);
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.3px;
  transition: all 0.2s;
  padding: 6px 2px;
  height: 100%;
}
.tab-btn.active { color: var(--gold); }
.tab-icon { font-size: 22px; line-height: 1; }

/* ── CARDS ───────────────────────────────────────── */
.card {
  background: var(--glass2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 12px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.card-sm {
  background: rgba(26,47,90,0.6);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 12px 14px;
  margin-bottom: 8px;
}
.glass-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

/* ── HOME HERO ───────────────────────────────────── */
.home-hero {
  position: relative;
  margin: 0 -14px;
  margin-top: -80px;
  padding: 100px 24px 32px;
  text-align: center;
  overflow: hidden;
  background: linear-gradient(180deg, rgba(10,20,40,0) 0%, rgba(13,27,62,0.8) 60%, rgba(10,20,40,1) 100%);
}
.home-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.15) 0%, transparent 70%),
    radial-gradient(ellipse at 20% 50%, rgba(52,152,219,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(201,168,76,0.05) 0%, transparent 50%);
  pointer-events: none;
}
.hero-logo-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 16px;
}
.hero-logo {
  width: 90px; height: 90px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--gold);
  box-shadow: 0 0 0 6px rgba(201,168,76,0.1), 0 0 40px rgba(201,168,76,0.25);
}
.hero-ring {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.3);
  animation: ringPulse 3s ease-in-out infinite;
}
.hero-ring2 {
  position: absolute;
  inset: -16px;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.15);
  animation: ringPulse 3s ease-in-out infinite 0.5s;
}
@keyframes ringPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.02)} }
.hero-name {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  color: var(--gold);
  margin-bottom: 6px;
}
.hero-tagline {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  font-style: italic;
  line-height: 1.6;
  margin-bottom: 4px;
}

/* ── SECTION HEADERS ─────────────────────────────── */
.section-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  margin-top: 4px;
}
.section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.count-badge {
  background: rgba(201,168,76,0.12);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 2px 9px;
  font-size: 10px;
  color: var(--muted);
  font-weight: 600;
}
.gold-rule { height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 16px 0; }

/* ── QUICK LINKS ─────────────────────────────────── */
.ql-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
.ql-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 8px;
  text-align: center;
  cursor: pointer;
  text-decoration: none;
  display: block;
  transition: all 0.2s;
  backdrop-filter: blur(10px);
}
.ql-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }
.ql-icon { font-size: 24px; margin-bottom: 6px; }
.ql-label { font-size: 10px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px; }

/* ── ANNOUNCEMENT ────────────────────────────────── */
.ann-card {
  background: linear-gradient(135deg, rgba(201,168,76,0.08) 0%, rgba(26,47,90,0.9) 100%);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 10px;
  border-left: 3px solid var(--gold);
  backdrop-filter: blur(10px);
}
.ann-label { font-size: 10px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
.ann-text { font-size: 14px; color: var(--white); line-height: 1.65; }
.ann-date { font-size: 11px; color: var(--muted); margin-top: 6px; }

/* ── TIP CARD ────────────────────────────────────── */
.tip-card {
  background: linear-gradient(135deg, rgba(52,152,219,0.06) 0%, rgba(26,47,90,0.8) 100%);
  border: 1px solid rgba(52,152,219,0.2);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 12px;
}
.tip-label { font-size: 10px; font-weight: 700; color: var(--gold2); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.tip-text { font-size: 13px; color: var(--white); line-height: 1.7; font-style: italic; }

/* ── CREATOR CARDS ───────────────────────────────── */
.creator-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.creator-card:hover,.creator-card.selected { border-color: var(--gold); background: rgba(201,168,76,0.06); }
.creator-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--navy2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  border: 2px solid var(--border2);
  flex-shrink: 0;
  position: relative;
}
.creator-avatar-img {
  width: 44px; height: 44px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border2);
  flex-shrink: 0;
}

/* ── BADGES ──────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.badge-live { background: rgba(231,76,60,0.15); color: #FF6B6B; border: 1px solid rgba(231,76,60,0.3); }
.badge-live::before { content:''; width:5px;height:5px;border-radius:50%;background:#FF6B6B;animation:livePulse 1.5s infinite; }
.badge-offline { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid rgba(255,255,255,0.07); }
.tbadge-free { color:var(--muted);border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.04); }
.tbadge-academy { color:var(--gold);border:1px solid var(--border2);background:rgba(201,168,76,0.1); }
.tbadge-multiplatform { color:var(--blue);border:1px solid rgba(52,152,219,0.3);background:rgba(52,152,219,0.08); }
.tbadge-business { color:var(--orange);border:1px solid rgba(230,126,34,0.3);background:rgba(230,126,34,0.08); }
.tbadge-subagency { color:var(--green);border:1px solid rgba(0,204,119,0.3);background:rgba(0,204,119,0.08); }

/* ── INPUTS ──────────────────────────────────────── */
input[type=text],input[type=password],input[type=number],input[type=url],textarea,select {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 12px 14px;
  font-size: 14px;
  color: var(--white);
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 10px;
  -webkit-appearance: none;
}
input:focus,textarea:focus,select:focus { border-color: var(--gold); background: rgba(201,168,76,0.05); }
textarea { resize: none; height: 72px; }
select option { background: #1A2F5A; }

/* ── BUTTONS ─────────────────────────────────────── */
.btn {
  width: 100%;
  padding: 13px;
  border-radius: var(--rs);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.btn-primary {
  background: linear-gradient(135deg, #C9A84C 0%, #E8C96A 50%, #C9A84C 100%);
  color: var(--navy);
  box-shadow: 0 4px 20px rgba(201,168,76,0.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(201,168,76,0.4); }
.btn-ghost { background: rgba(255,255,255,0.06); color: var(--gold); border: 1px solid var(--border2); }
.btn-sm {
  padding: 6px 12px;
  border-radius: var(--rs);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid transparent;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
  text-transform: uppercase;
}
.btn-approve { background: rgba(0,204,119,0.12); color: var(--green); border-color: rgba(0,204,119,0.3); }
.btn-reject { background: rgba(201,168,76,0.08); color: var(--gold); border-color: var(--border); }

/* ── AUTH SCREENS ────────────────────────────────── */
.auth-wrap {
  max-width: 320px;
  margin: 0 auto;
  text-align: center;
  padding: 20px 14px;
}
.auth-logo {
  width: 80px; height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--gold);
  margin-bottom: 16px;
  box-shadow: 0 0 30px rgba(201,168,76,0.25);
}
.auth-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); margin-bottom: 6px; }
.auth-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
.auth-err { font-size: 12px; color: #FF6B6B; margin-top: 6px; min-height: 18px; }

/* ── QUEUE ITEMS ─────────────────────────────────── */
.queue-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  margin-bottom: 8px;
}
.q-num {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--gold);
  min-width: 32px;
  line-height: 1;
}
.q-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 13px 15px;
  margin-bottom: 8px;
}
.q-text { font-size: 14px; color: var(--white); line-height: 1.55; margin-bottom: 8px; }
.q-meta { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.upvote {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 11px; font-weight: 700;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
}
.upvote:hover,.upvote.voted { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }

/* ── TOGGLE ──────────────────────────────────────── */
.live-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, rgba(26,47,90,0.9) 100%);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 12px;
}
.toggle-switch { position: relative; width: 50px; height: 27px; cursor: pointer; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.1);
  border-radius: 999px;
  transition: all 0.3s;
  border: 1px solid var(--border);
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 21px; height: 21px;
  left: 2px; top: 2px;
  background: var(--muted);
  border-radius: 50%;
  transition: all 0.3s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.toggle-switch input:checked + .toggle-slider { background: rgba(201,168,76,0.2); border-color: var(--gold); }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(23px); background: var(--gold); box-shadow: 0 2px 12px rgba(201,168,76,0.4); }

/* ── STATS ───────────────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 12px; }
.stat-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  text-align: center;
}
.stat-num { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--gold); font-weight: 700; line-height: 1; }
.stat-label { font-size: 10px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.progress-bar { background: rgba(255,255,255,0.06); border-radius: 999px; height: 6px; overflow: hidden; margin-bottom: 14px; }
.progress-fill { background: linear-gradient(90deg, var(--gold), var(--gold2)); height: 100%; border-radius: 999px; transition: width 0.5s; }

/* ── HUB TIERS ───────────────────────────────────── */
.tier-section { margin-bottom: 20px; }
.tier-banner {
  border-radius: var(--r);
  padding: 14px 16px;
  margin-bottom: 10px;
  border: 1px solid;
}
.tier-banner.free { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.1); }
.tier-banner.academy { background: rgba(201,168,76,0.08); border-color: var(--border2); }
.tier-banner.multiplatform { background: rgba(52,152,219,0.08); border-color: rgba(52,152,219,0.3); }
.tier-banner.business { background: rgba(230,126,34,0.08); border-color: rgba(230,126,34,0.3); }
.tier-banner.subagency { background: rgba(0,204,119,0.06); border-color: rgba(0,204,119,0.25); }
.tier-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.tier-title.free { color: var(--white); }
.tier-title.academy { color: var(--gold); }
.tier-title.multiplatform { color: var(--blue); }
.tier-title.business { color: var(--orange); }
.tier-title.subagency { color: var(--green); }
.tier-sub { font-size: 11px; color: var(--muted); }
.locked-box {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  text-align: center;
  margin-bottom: 12px;
}
.locked-icon { font-size: 28px; margin-bottom: 8px; }
.locked-title { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--gold); margin-bottom: 5px; }
.locked-sub { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.6; }
.video-card-wrap {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.video-card-wrap:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.3); }
.video-thumb {
  width: 100%;
  height: 210px;
  background: rgba(255,255,255,0.06);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.video-play-btn {
  width: 62px; height: 62px;
  border-radius: 50%;
  background: rgba(201,168,76,0.92);
  color: var(--navy);
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 0 4px rgba(201,168,76,0.2);
  transition: all 0.2s;
  padding-left: 5px;
}
.video-card-wrap:hover .video-play-btn { transform: scale(1.08); background: var(--gold); }
.video-info { padding: 12px 14px; }
.video-title { font-size: 13px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
.video-desc { font-size: 11px; color: var(--muted); }
/* VIDEO MODAL */
.video-modal {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  display: none;
}
.video-modal.open { display: flex; }
.video-modal-header {
  width: 100%;
  max-width: 480px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.video-modal-title { font-size: 14px; font-weight: 600; color: var(--white); flex: 1; padding-right: 10px; }
.video-modal-close {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: none;
  color: var(--white);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.video-embed-wrap {
  width: 100%;
  max-width: 480px;
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  border-radius: var(--r);
  overflow: hidden;
  background: #000;
}
.video-embed-wrap iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
  border-radius: var(--r);
}

/* ── DEALS ───────────────────────────────────────── */
.deal-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 10px;
}
.deal-brand { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--white); margin-bottom: 5px; }
.deal-desc { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
.deal-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.deal-tag { font-size: 10px; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border2); color: var(--gold); background: rgba(201,168,76,0.08); }
.deal-pay { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 10px; }
.deal-applied { font-size: 11px; color: var(--green); font-weight: 700; padding: 6px 12px; border-radius: var(--rs); background: rgba(0,204,119,0.1); border: 1px solid rgba(0,204,119,0.2); display: inline-block; }

/* ── MOD ─────────────────────────────────────────── */
.invite-box {
  background: rgba(201,168,76,0.08);
  border: 1px solid var(--border2);
  border-radius: var(--rs);
  padding: 13px 16px;
  font-size: 16px;
  color: var(--gold);
  letter-spacing: 0.1em;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  font-weight: 700;
}
.copy-btn {
  font-size: 10px;
  color: var(--muted);
  cursor: pointer;
  padding: 5px 10px;
  border-radius: var(--rs);
  border: 1px solid var(--border);
  background: transparent;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
  text-transform: uppercase;
}
.copy-btn:hover { color: var(--gold); }
.tier-btns { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
.tier-btn {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
  text-transform: uppercase;
}
.tier-btn.active-free { color:var(--white);border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.08); }
.tier-btn.active-academy { color:var(--gold);border-color:var(--border2);background:rgba(201,168,76,0.12); }
.tier-btn.active-multiplatform { color:var(--blue);border-color:rgba(52,152,219,0.3);background:rgba(52,152,219,0.08); }
.tier-btn.active-business { color:var(--orange);border-color:rgba(230,126,34,0.3);background:rgba(230,126,34,0.08); }
.tier-btn.active-subagency { color:var(--green);border-color:rgba(0,204,119,0.3);background:rgba(0,204,119,0.1); }
.emoji-opt { font-size: 22px; cursor: pointer; padding: 6px; border-radius: var(--rs); border: 2px solid transparent; transition: all 0.2s; }
.emoji-opt:hover { background: rgba(255,255,255,0.06); }
.emoji-opt.selected { border-color: var(--gold); background: rgba(201,168,76,0.1); }

/* ── TOAST ───────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: calc(72px + var(--safe-bottom) + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--navy);
  padding: 11px 20px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
  z-index: 100;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap;
  pointer-events: none;
  box-shadow: 0 4px 20px rgba(201,168,76,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: linear-gradient(135deg, #E74C3C, #C0392B); color: white; box-shadow: 0 4px 20px rgba(231,76,60,0.3); }

/* ── EMPTY STATES ────────────────────────────────── */
.empty { text-align: center; padding: 32px 14px; color: var(--muted); font-size: 13px; }
.empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.6; }

/* ── CARD LABEL ──────────────────────────────────── */
.card-label { font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
</style>
</head>

const niche=n=>n==='pets'?'🐾 Pets':n==='beauty'?'✨ Beauty':'🌿 Lifestyle';

function toast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(err?' error':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
function copyText(t){navigator.clipboard.writeText(t).then(()=>toast('Copied!'));}
function playVideo(ytId, title, fallbackUrl){
  if(ytId){
    document.getElementById('video-modal-title').textContent=title;
    document.getElementById('video-iframe').src=`https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1`;
    document.getElementById('video-modal').classList.add('open');
    document.body.style.overflow='hidden';
  } else {
    window.open(fallbackUrl,'_blank');
  }
}
function closeVideo(){
  document.getElementById('video-modal').classList.remove('open');
  document.getElementById('video-iframe').src='';
  document.body.style.overflow='';
}
function genCode(n){const w={pets:['LUNA','PAWS','BOOP','FUZZ','WOOF'],beauty:['GLOW','MUSE','LUXE','ROSE','GLAM'],lifestyle:['VIBE','FLOW','BLOOM','CHILL','AURA']};const a=w[n]||w.pets;return `${a[Math.floor(Math.random()*a.length)]}-${n.toUpperCase().slice(0,3)}-${Math.floor(1000+Math.random()*9000)}`;}
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  ({home:renderHome,liveq:renderLiveQ,hub:renderHub,mystats:renderMyStats,deals:renderDeals,mod:renderMod})[tab]?.();
}

    </div>

      <div class="tip-text">"${tip}"</div>
    </div>
    <div class="section-hd"><span class="section-label">Announcements</span></div>

        <div class="ann-label">📢 From the Agency</div>
        <div class="ann-text">${san(a.text)}</div>
        <div class="ann-date">${a.createdAt?new Date(a.createdAt.seconds*1000).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'Recently'}</div>

      <div class="ann-card">
        <div class="ann-label">📢 From the Agency</div>
        <div class="ann-text">Welcome to the Bloom & Co Creator Hub. Your resources, live tools, stats, and brand deals are all here. Let's get to work.</div>

        <div class="creator-card" onclick="switchTab('liveq');setTimeout(()=>selectFanCreator('${c.id}'),100);">
          <div class="creator-avatar">${c.emoji||'🎬'}</div>

          <span class="badge badge-live">Live</span>

  </div>`;
}

function renderLiveQ(){
  const s=document.getElementById('screen-liveq');
  if(currentCreator){
    const approved=Object.values(questions).filter(q=>q.creatorId===currentCreator.id&&q.status==='approved');
    s.innerHTML=`<div class="screen-content">
      <div class="live-toggle">
        <div>
          <div style="font-size:15px;font-weight:600;font-family:'Playfair Display',serif;">${san(currentCreator.name)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px;" id="lq-status">${currentCreator.live?'🔴 You are LIVE':'⚫ You are offline'}</div>
        </div>
        <label class="toggle-switch"><input type="checkbox" id="lq-toggle" ${currentCreator.live?'checked':''} onchange="toggleLive()"/><span class="toggle-slider"></span></label>
      </div>
      <div class="section-hd"><span class="section-label">Question Queue</span><span class="count-badge">${approved.length}</span></div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:14px;">Approved questions — answer these on your live</p>
      ${approved.length?approved.map((q,i)=>`
        <div class="queue-item">
          <div class="q-num">${String(i+1).padStart(2,'0')}</div>
          <div><div style="font-size:14px;color:var(--white);line-height:1.5;margin-bottom:4px;">${san(q.text)}</div><div style="font-size:11px;color:var(--muted);">from ${san(q.name||'@anonymous')}</div></div>
        </div>`).join(''):'<div class="empty"><div class="empty-icon">⏳</div>No approved questions yet</div>'}
      <div style="margin-top:20px;"><button class="btn btn-ghost" onclick="creatorLogout()" style="font-size:11px;">Switch Account</button></div>
    </div>`;
  } else {
    const sorted=[...Object.values(creators)].sort((a,b)=>(b.live?1:0)-(a.live?1:0));
    const myQs=selectedCreatorId?Object.values(questions).filter(q=>q.creatorId===selectedCreatorId&&q.status!=='rejected').sort((a,b)=>(b.votes||0)-(a.votes||0)):[];
    s.innerHTML=`<div class="screen-content">
      <div class="card">
        <p class="card-label">Who's Live Right Now?</p>
        ${sorted.length?sorted.map(c=>`
          <div class="creator-card ${selectedCreatorId===c.id?'selected':''}" onclick="selectFanCreator('${c.id}')">
            <div class="creator-avatar">${c.emoji||'🎬'}</div>
            <div style="flex:1;"><div style="font-size:14px;font-weight:600;">${san(c.name)}</div><div style="font-size:11px;color:var(--muted);margin-top:2px;">${niche(c.niche)}</div></div>
            ${c.live?'<span class="badge badge-live">Live</span>':'<span class="badge badge-offline">Offline</span>'}
          </div>`).join(''):'<div class="empty"><div class="empty-icon">🎬</div>No creators yet</div>'}
      </div>
      ${selectedCreatorId?`
        <div class="card">
          <p class="card-label">Ask a Question</p>
          <input type="text" id="fan-name" placeholder="@yourusername" maxlength="40" autocapitalize="none" autocorrect="off"/>
          <textarea id="fan-q" placeholder="Type your question here..." maxlength="300"></textarea>
          <button class="btn btn-primary" onclick="submitQ()">Send Question</button>
        </div>
        <div class="section-hd"><span class="section-label">Top Questions</span><span class="count-badge">${myQs.length}</span></div>
        ${myQs.map(q=>`
          <div class="q-card">
            <div class="q-text">${san(q.text)}</div>
            <div class="q-meta"><span>${san(q.name||'@anonymous')}</span><button class="upvote ${q.myVote?'voted':''}" onclick="upvote('${q.id}')">▲ ${q.votes||0}</button></div>
          </div>`).join('')||'<div class="empty">No questions yet — be first!</div>'}`:''}
      <div class="gold-rule"></div>
      <div class="card" style="text-align:center;">
        <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">Are you a creator?</p>
        <button class="btn btn-ghost" onclick="showCreatorLogin()" style="font-size:11px;">Creator Login</button>
      </div>
    </div>`;
  }
}
function selectFanCreator(id){selectedCreatorId=id;renderLiveQ();}
let _lastQ=0,_qCount=0;
async function submitQ(){
  const now=Date.now();
  if(now-_lastQ<10000){toast('Please wait before sending another question',true);return;}
  if(_qCount>=5){toast('Question limit reached for this session',true);return;}
  const name=document.getElementById('fan-name')?.value.trim()||'@anonymous';
  const text=document.getElementById('fan-q')?.value.trim();
  if(!text){toast('Type a question first',true);return;}
  if(!selectedCreatorId){toast('Select a creator first',true);return;}
  const blocked=['<script','javascript:','onerror=','eval(','document.','window.'];
  if(blocked.some(b=>text.toLowerCase().includes(b))){toast('Invalid input',true);return;}
  _lastQ=now;_qCount++;
  try{await fs().addDoc(col('questions'),{creatorId:selectedCreatorId,name:san(name),text:san(text),status:'pending',votes:0,createdAt:fs().serverTimestamp()});renderLiveQ();toast('Question sent! ✓');}
  catch(e){toast('Connection error',true);}
}
let _upvLog={};
async function upvote(id){
  const now=Date.now();if(_upvLog[id]&&now-_upvLog[id]<3000)return;_upvLog[id]=now;
  const q=questions[id];if(!q)return;
  const nv=!q.myVote;q.myVote=nv;renderLiveQ();
  try{await fs().updateDoc(ref('questions',id),{votes:(q.votes||0)+(nv?1:-1)});}
  catch(e){q.myVote=!nv;renderLiveQ();}
}
async function toggleLive(){
  const isLive=document.getElementById('lq-toggle')?.checked;if(!currentCreator)return;
  try{await fs().updateDoc(ref('creators',currentCreator.id),{live:isLive});currentCreator.live=isLive;const el=document.getElementById('lq-status');if(el)el.textContent=isLive?'🔴 You are LIVE':'⚫ You are offline';toast(isLive?"You're live! 🔴":"You're offline.");renderHome();}
  catch(e){toast('Error',true);}
}

async function creatorLogin(){
  const code=document.getElementById('c-code')?.value.trim().toUpperCase();
  if(!code){document.getElementById('c-err').textContent='Enter your code';return;}
  document.getElementById('c-err').textContent='Checking...';
  try{
    const inv=await fs().getDoc(ref('invites',code));

function renderHub(){
  const s=document.getElementById('screen-hub');
  if(!currentCreator){
    s.innerHTML=`<div class="screen-content"><div class="auth-wrap">
      <img src="${logoSrc()}" class="auth-logo" alt="Bloom & Co"/>
      <p class="auth-title">Creator Hub</p>
      <p class="auth-sub">Log in with your creator code to access your resources</p>
      <input type="text" id="hub-code" placeholder="e.g. LUNA-PET-7742" style="text-transform:uppercase;letter-spacing:.05em;text-align:center;" maxlength="20" autocapitalize="characters" autocorrect="off" onkeydown="if(event.key==='Enter')hubLogin()"/>
      <button class="btn btn-primary" onclick="hubLogin()">Access Hub</button>
      <p class="auth-err" id="hub-err"></p>
    </div></div>`;return;
  }
  const myTier=currentCreator.tier||'free';
  const myRank=tierRank(myTier);
  const myNiche=currentCreator.niche;
  const allVids=Object.values(hubVideos);
  const getVids=(tier)=>allVids.filter(v=>v.tier===tier&&(!v.niche||v.niche===myNiche||v.niche==='all'));
  const groupByCategory=(vids)=>{
    const groups={};
    vids.forEach(v=>{const cat=v.category||'General';if(!groups[cat])groups[cat]=[];groups[cat].push(v);});
    return groups;
  };
  const renderVidGroup=(vids)=>{
    if(!vids.length)return'';
    const groups=groupByCategory(vids);
    return Object.entries(groups).map(([cat,cvids])=>`
      <div style="margin-bottom:18px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <div style="height:1px;flex:1;background:var(--border);"></div>
          <span style="font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;">${san(cat)}</span>
          <div style="height:1px;flex:1;background:var(--border);"></div>
        </div>
        ${cvids.map(vidCard).join('')}
      </div>`).join('');
  };
  const getYTId=(url)=>{
    if(!url) return null;
    try {
      if(url.includes('youtu.be/')) {
        const part = url.split('youtu.be/')[1];
        return part ? part.split('?')[0].split('&')[0].substring(0,11) : null;
      }
      if(url.includes('youtube.com/watch')) {
        const u = new URL(url);
        return u.searchParams.get('v');
      }
      if(url.includes('youtube.com/embed/')) {
        const part = url.split('youtube.com/embed/')[1];
        return part ? part.split('?')[0].substring(0,11) : null;
      }
    } catch(e) {}
    return null;
  };
  const vidCard=(v)=>{
    const ytId=getYTId(v.url);
    const icon=v.category==='coaching'?'🎥':v.niche==='pets'?'🐾':v.niche==='beauty'?'✨':v.niche==='lifestyle'?'🌿':'📚';
    return `<div class="video-card-wrap" onclick="playVideo('${ytId||''}','${san(v.title)}','${san(v.url)}')">
      <div class="video-thumb" style="background:${ytId?`url(https://img.youtube.com/vi/${ytId}/mqdefault.jpg) center/cover no-repeat`:'rgba(255,255,255,0.06)'};">
        <div class="video-play-btn">▶</div>
      </div>
      <div class="video-info">
        <div class="video-title">${icon}  ${san(v.title)}</div>
        <div class="video-desc">${san(v.description||'Tap to watch')}</div>
      </div>
    </div>`;
  };
  const lockedBox=(tier)=>`
    <div class="locked-box" style="border:1px solid rgba(201,168,76,0.3);background:linear-gradient(135deg,rgba(201,168,76,0.05),rgba(26,47,90,0.8));">
      <div class="locked-icon">🔒</div>
      <div class="locked-title">${TIER_LABELS[tier]}</div>
      <div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;">PAID MEMBERSHIP REQUIRED</div>
      <div class="locked-sub">${TIER_DESC[tier]}.<br/><br/>This section is locked. Contact your agency to upgrade your membership and unlock full access.</div>
      <a href="${LINKS.website}" target="_blank" style="display:inline-block;margin-top:14px;font-size:12px;color:var(--gold);text-decoration:none;">Learn more at bloomconetwork.com →</a>
    </div>`;
  const tierSections=TIER_ORDER.map(tier=>{
    const vids=getVids(tier);
    const canAccess=myRank>=tierRank(tier);
    return `<div class="tier-section">
      <div class="tier-banner ${tier}">
        <div class="tier-title ${tier}">${TIER_LABELS[tier]}</div>
        <div class="tier-sub">${TIER_DESC[tier]}</div>
      </div>
      ${canAccess?(vids.length?renderVidGroup(vids):`
      <div class="locked-box" style="border:1px solid rgba(201,168,76,0.2);background:rgba(26,47,90,0.5);">
        <div class="locked-icon">📂</div>
        <div class="locked-title" style="color:var(--muted);">Content Coming Soon</div>
        <div class="locked-sub">Your agency is adding videos to this section. Check back soon.</div>
      </div>`):lockedBox(tier)}
    </div>`;
  }).join('<div class="gold-rule"></div>');
  s.innerHTML=`<div class="screen-content">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--r);">
      <div class="creator-avatar" style="width:48px;height:48px;font-size:22px;">${currentCreator.emoji||'🎬'}</div>
      <div style="flex:1;">
        <p style="font-family:'Playfair Display',serif;font-size:16px;color:var(--gold);">${san(currentCreator.name)}</p>
        <p style="font-size:11px;color:var(--muted);margin-top:2px;">${niche(myNiche)}</p>
      </div>
      <span class="${tierBadgeClass(myTier)}">${tierLabel(myTier)}</span>
    </div>
    <div class="gold-rule"></div>
    ${tierSections}
    <div style="margin-top:20px;"><button class="btn btn-ghost" onclick="creatorLogout();renderHub()" style="font-size:11px;">Log Out</button></div>
  </div>`;
}

      <p class="card-label">Post Announcement</p>
      <textarea id="ann-text" placeholder="Network announcement..."></textarea>
      <button class="btn btn-primary" onclick="postAnn()">Post to Home Screen</button>
    </div>
    <div class="card">
      <p class="card-label">Add Hub Video</p>
      <input type="text" id="v-title" placeholder="Video title" maxlength="80"/>
      <input type="url" id="v-url" placeholder="YouTube link (individual video)" maxlength="200"/>
      <input type="text" id="v-desc" placeholder="Short description (optional)" maxlength="100"/>
      <input type="text" id="v-cat" placeholder="Category e.g. Getting Started, Live Strategy, Gifting" maxlength="50"/>
      <select id="v-tier">
        <option value="free">🆓 Free — all creators</option>
        <option value="academy">⭐ Creator Academy only</option>
        <option value="multiplatform">📱 Multi-Platform Hub only</option>
        <option value="business">💼 Business Builder only</option>
        <option value="subagency">🤝 Sub-Agency Partner only</option>
      </select>
      <select id="v-niche">
        <option value="all">All niches</option>
        <option value="pets">🐾 Pets only</option>
        <option value="beauty">✨ Beauty only</option>
        <option value="lifestyle">🌿 Lifestyle only</option>
      </select>
      <button class="btn btn-primary" onclick="addVideo()">Add to Hub</button>
    </div>
    <div class="card">
      <p class="card-label">Post Brand Deal</p>
      <input type="text" id="d-brand" placeholder="Brand name" maxlength="60"/>
      <textarea id="d-desc" placeholder="What does the brand need?"></textarea>
      <input type="text" id="d-pay" placeholder="Pay e.g. $200 flat fee" maxlength="60"/>
      <input type="text" id="d-type" placeholder="Type e.g. Sponsored Live" maxlength="40"/>
      <div style="display:flex;gap:14px;margin-bottom:12px;">
        <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;"><input type="checkbox" id="d-pets"> 🐾 Pets</label>
        <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;"><input type="checkbox" id="d-beauty"> ✨ Beauty</label>
        <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;"><input type="checkbox" id="d-lifestyle"> 🌿 Lifestyle</label>
      </div>
      <button class="btn btn-primary" onclick="postDeal()">Post Deal</button>
    </div>
    <div class="gold-rule"></div>
    <div class="section-hd"><span class="section-label">All Creators (${allCreators.length})</span></div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:12px;">Tap a tier button to update instantly</p>
    ${allCreators.map((c,i)=>`
      <div class="card" style="padding:13px 15px;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:${i===0?'var(--gold)':i===1?'#C0C0C0':i===2?'#CD7F32':'var(--muted)'};min-width:26px;text-align:center;">${i===0?'👑':i===1?'🥈':i===2?'🥉':i+1}</div>
          <div class="creator-avatar" style="width:36px;height:36px;font-size:18px;">${c.emoji||'🎬'}</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:600;font-family:'Playfair Display',serif;">${san(c.name)}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px;">${niche(c.niche)} · 💎${(c.diamonds||0).toLocaleString()} · ${c.hours||0}hrs</div>
            <div style="font-size:10px;color:var(--muted);">Code: <span style="color:var(--gold);font-weight:700;">${c.code}</span></div>
          </div>
          ${c.live?'<span class="badge badge-live">Live</span>':'<span class="badge badge-offline">Offline</span>'}
        </div>
        <div class="tier-btns">
          ${TIER_ORDER.map(t=>`<button class="tier-btn ${(c.tier||'free')===t?`active-${t}`:''}" onclick="setTier('${c.id}','${t}')">${t==='free'?'Free':t==='academy'?'Academy':t==='multiplatform'?'Multi':t==='business'?'Business':'Partner'}</button>`).join('')}
          <button class="tier-btn" style="color:#FF6B6B;border-color:rgba(255,107,107,0.3);background:rgba(255,107,107,0.08);margin-left:auto;" onclick="deleteCreator('${c.id}','${san(c.name)}')">🗑 Remove</button>
        </div>
      </div>`).join('')||'<div class="empty">No creators yet</div>'}
    <div class="gold-rule"></div>
    <div class="section-hd"><span class="section-label">All Schedules (${allSchedules.length})</span></div>
    ${allSchedules.map(sc=>`
      <div class="card-sm" style="display:flex;align-items:center;gap:12px;">
        <div style="min-width:88px;"><div style="font-size:12px;font-weight:700;color:var(--gold);">${san(sc.day)}</div><div style="font-size:12px;color:var(--white);">${san(sc.time)}</div></div>
        <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${san(sc.creatorName)}</div><div style="font-size:11px;color:var(--muted);">${niche(sc.niche)}${sc.topic?' · '+san(sc.topic):''}</div></div>
        ${sc.live?'<span class="badge badge-live">Live</span>':''}
      </div>`).join('')||'<div class="empty">No schedules yet</div>'}
    <div class="gold-rule"></div>
    <div class="section-hd"><span class="section-label">Pending Questions (${pending.length})</span></div>
    ${pending.map(q=>`
      <div class="q-card">
        <div class="q-meta" style="margin-bottom:8px;"><span style="font-weight:700;color:var(--gold);">${san(cName(q.creatorId))}</span><span>${san(q.name||'@anonymous')}</span><span>▲${q.votes||0}</span></div>
        <div class="q-text">${san(q.text)}</div>
        <div style="display:flex;gap:8px;margin-top:10px;"><button class="btn-sm btn-approve" onclick="modAction('${q.id}','approved')">✓ Approve</button><button class="btn-sm btn-reject" onclick="modAction('${q.id}','rejected')">✕ Reject</button></div>
      </div>`).join('')||'<div class="empty">All caught up ✓</div>'}
    <div class="gold-rule"></div>
    <div class="section-hd"><span class="section-label">Approved (${approved.length})</span></div>
    ${approved.map(q=>`
      <div class="q-card">
        <div class="q-meta" style="margin-bottom:6px;"><span style="font-weight:700;color:var(--gold);">${san(cName(q.creatorId))}</span><span>${san(q.name||'@anonymous')}</span></div>
        <div class="q-text">${san(q.text)}</div>
        <div style="margin-top:8px;"><button class="btn-sm btn-reject" onclick="modAction('${q.id}','rejected')">Remove</button></div>
      </div>`).join('')||'<div class="empty">No approved questions</div>'}
    ${apps.length?`
      <div class="gold-rule"></div>
      <div class="section-hd"><span class="section-label">Deal Applications (${apps.length})</span></div>
      ${apps.map(a=>`<div class="q-card"><div class="q-meta" style="margin-bottom:5px;"><span style="font-weight:700;color:var(--gold);">${san(a.brand)}</span></div><div style="font-size:13px;">${san(a.creatorName)} · ${niche(a.niche)}</div></div>`).join('')}`:''}
    <div style="margin-top:20px;"><button class="btn btn-ghost" onclick="modLogout()" style="font-size:11px;">Log Out</button></div>
  </div>`;
}
function unlockMod(){
  const pw=document.getElementById('mod-pw').value;
  if(pw==='Bloom0609.'){modLoggedIn=true;renderMod();subscribeModData();}
  else{document.getElementById('mod-err').textContent='Incorrect password.';}
}
function modLogout(){modLoggedIn=false;renderMod();}
async function modAction(id,status){try{await fs().updateDoc(ref('questions',id),{status});toast(status==='approved'?'Approved! ✓':'Removed.');}catch(e){toast('Error',true);}}
async function deleteCreator(creatorId, name){
  if(!confirm(`Remove ${name} from the roster? This cannot be undone.`)) return;
  try {
    // Delete creator document
    await fs().updateDoc(ref('creators',creatorId),{deleted:true,deletedAt:fs().serverTimestamp()});
    // Remove from local state
    delete creators[creatorId];
    toast(`${name} removed from roster.`);
    renderMod();
  } catch(e) { toast('Error removing creator',true); }
}
async function setTier(creatorId,tier){
  try{await fs().updateDoc(ref('creators',creatorId),{tier,tierUpdatedAt:fs().serverTimestamp()});if(creators[creatorId])creators[creatorId].tier=tier;if(currentCreator?.id===creatorId)currentCreator.tier=tier;toast(`Updated to ${tierLabel(tier)}! ✓`);renderMod();}
  catch(e){toast('Error updating tier',true);}
}
async function generateInvite(){
  const n=document.getElementById('inv-niche')?.value;const code=genCode(n);
  try{await fs().setDoc(ref('invites',code),{niche:n,used:false,createdAt:fs().serverTimestamp()});document.getElementById('invite-result').innerHTML=`<div class="invite-box"><span>${code}</span><button class="copy-btn" onclick="copyText('${code}')">Copy</button></div><p style="font-size:10px;color:var(--muted);">One-time use · ${n}</p>`;toast('Code generated! ✓');}
  catch(e){toast('Error',true);}
}
async function postAnn(){
  const text=document.getElementById('ann-text')?.value.trim();
  if(!text){toast('Write something first',true);return;}
  try{await fs().addDoc(col('announcements'),{text:san(text),createdAt:fs().serverTimestamp()});document.getElementById('ann-text').value='';toast('Posted! ✓');}
  catch(e){toast('Error',true);}
}
async function addVideo(){
  const title=document.getElementById('v-title')?.value.trim();
  const url=document.getElementById('v-url')?.value.trim();
  const desc=document.getElementById('v-desc')?.value.trim();
  const tier=document.getElementById('v-tier')?.value;
  const vn=document.getElementById('v-niche')?.value;
  if(!title||!url){toast('Add title and YouTube link',true);return;}
  const isYT = url.includes('youtube.com/watch') || url.includes('youtu.be/') || url.includes('youtube.com/embed/');
  if(!isYT){toast('Use a direct YouTube video link — tap Share then Copy Link on the video',true);return;}
  const cat=document.getElementById('v-cat')?.value.trim();
  try{await fs().addDoc(col('hubVideos'),{title:san(title),url:san(url),description:san(desc),category:san(cat||''),tier,niche:vn==='all'?null:vn,createdAt:fs().serverTimestamp()});document.getElementById('v-title').value='';document.getElementById('v-url').value='';document.getElementById('v-desc').value='';document.getElementById('v-cat').value='';toast('Video added! ✓');}
  catch(e){toast('Error',true);}
}
async function postDeal(){
  const brand=document.getElementById('d-brand')?.value.trim();
  const desc=document.getElementById('d-desc')?.value.trim();
  if(!brand||!desc){toast('Add brand and description',true);return;}
  const niches=[];
  if(document.getElementById('d-pets')?.checked)niches.push('pets');
  if(document.getElementById('d-beauty')?.checked)niches.push('beauty');
  if(document.getElementById('d-lifestyle')?.checked)niches.push('lifestyle');
  try{await fs().addDoc(col('brandDeals'),{brand:san(brand),description:san(desc),pay:san(document.getElementById('d-pay')?.value.trim()||''),type:san(document.getElementById('d-type')?.value.trim()||''),niches,createdAt:fs().serverTimestamp()});toast('Deal posted! ✓');document.getElementById('d-brand').value='';document.getElementById('d-desc').value='';}
  catch(e){toast('Error',true);}
}

// ══ SUBSCRIPTIONS ══════════════════════════════════
function subscribeModData(){
  fs().onSnapshot(col('questions'),snap=>{questions={};snap.docs.forEach(d=>questions[d.id]={id:d.id,...d.data()});if(modLoggedIn&&document.getElementById('screen-mod').classList.contains('active'))renderMod();});
  fs().onSnapshot(col('dealApplications'),snap=>{window._dealApps={};snap.docs.forEach(d=>window._dealApps[d.id]={id:d.id,...d.data()});if(modLoggedIn&&document.getElementById('screen-mod').classList.contains('active'))renderMod();});
}
function startSubscriptions(){
  fs().onSnapshot(col('creators'),snap=>{creators={};snap.docs.forEach(d=>creators[d.id]={id:d.id,...d.data()});const liveCount=Object.values(creators).filter(c=>c.live).length;document.getElementById('live-count').innerHTML=`<span class="live-dot-anim"></span><span>${liveCount} Live</span>`;if(currentCreator){const u=creators[currentCreator.id];if(u)Object.assign(currentCreator,u);}if(document.getElementById('screen-home').classList.contains('active'))renderHome();if(modLoggedIn&&document.getElementById('screen-mod').classList.contains('active'))renderMod();});
  fs().onSnapshot(col('questions'),snap=>{snap.docs.forEach(d=>{const ex=questions[d.id];questions[d.id]={id:d.id,...d.data(),myVote:ex?.myVote||false};});Object.keys(questions).forEach(id=>{if(!snap.docs.find(d=>d.id===id))delete questions[id];});if(document.getElementById('screen-liveq')?.classList.contains('active'))renderLiveQ();if(document.getElementById('screen-mystats')?.classList.contains('active'))renderMyStats();});
  fs().onSnapshot(col('schedules'),snap=>{schedules={};snap.docs.forEach(d=>schedules[d.id]={id:d.id,...d.data()});if(document.getElementById('screen-mystats')?.classList.contains('active'))renderMyStats();if(modLoggedIn&&document.getElementById('screen-mod').classList.contains('active'))renderMod();});
  fs().onSnapshot(col('brandDeals'),snap=>{deals={};snap.docs.forEach(d=>deals[d.id]={id:d.id,...d.data()});if(document.getElementById('screen-deals')?.classList.contains('active'))renderDeals();});
  fs().onSnapshot(col('announcements'),snap=>{announcements={};snap.docs.forEach(d=>announcements[d.id]={id:d.id,...d.data()});if(document.getElementById('screen-home')?.classList.contains('active'))renderHome();});
  fs().onSnapshot(col('hubVideos'),snap=>{hubVideos={};snap.docs.forEach(d=>hubVideos[d.id]={id:d.id,...d.data()});if(document.getElementById('screen-hub')?.classList.contains('active'))renderHub();});
}
async function tryAutoLogin(){
  const saved=localStorage.getItem('bc_cc');if(!saved)return;
  try{const snap=await fs().getDocs(fs().query(col('creators'),fs().where('code','==',saved)));if(!snap.empty){const d=snap.docs[0];currentCreator={id:d.id,...d.data()};subscribeCreatorQueue();}}catch(e){}
}
whenReady(()=>{startSubscriptions();tryAutoLogin().then(()=>renderHome());});
</script>
</body>
</html>
